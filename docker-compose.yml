version: "3"

services:

  app:
    image: suryapavan24/cloud-expense-tracker:latest
    container_name: expense_app
    restart: always
    ports:
      - "5000:5000"

  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app
